version: "3.9"

services:
  fastapi:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    command: celery -A workers.celery_app worker --loglevel=info
    depends_on:
      - postgres
      - redis
    env_file: ./backend/.env
    volumes:
      - ./backend:/app

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: zerotrustx
      POSTGRES_USER: zerotrustx
      POSTGRES_PASSWORD: zerotrustx_pw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - fastapi

volumes:
  postgres_data:
